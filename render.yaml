services:
  - type: web
    name: cactus-pro-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cactus-pro-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://cactus-pro.vercel.app
      - key: NODE_ENV
        value: production
      # JWT secrets — generated once by Render and kept stable across deploys.
      # Required in production (server fails fast at boot if unset).
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: cactus-pro-db
    plan: free
    databaseName: cactus_pro
    user: cactus_user
