services:
  - type: web
    name: cactus-pro-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cactus-pro-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://cactus-pro.vercel.app
      - key: NODE_ENV
        value: production

databases:
  - name: cactus-pro-db
    plan: free
    databaseName: cactus_pro
    user: cactus_user
